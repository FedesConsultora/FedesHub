services:
  fedeshub-db:
    image: postgres:16
    container_name: fedeshub-db
    restart: always
    env_file: ./backend/.env
    environment:
      POSTGRES_USER: ${DB_USER:-fedeshub}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fedeshub}
      POSTGRES_DB: ${DB_NAME:-fedeshub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$DB_USER -d $$DB_NAME" ]
      interval: 5s
      retries: 10
    networks:
      - fedes-net
    ports:
      - "5435:5432"

  backend:
    build: ./backend
    container_name: fedes-hub
    restart: always
    env_file: ./backend/.env
    command: npm start
    depends_on:
      fedeshub-db:
        condition: service_healthy
    networks:
      - fedes-net
    ports:
      - "4000:4000"
    volumes:
      - ./backend/public/avatars:/usr/src/app/public/avatars
      - ./backend/uploads:/usr/src/app/uploads

  frontend:
    build: ./frontend
    container_name: fedes-hub_frontend
    restart: always
    networks:
      - fedes-net
    ports:
      - "3000:80"
    volumes:
      - ./backend/public/avatars:/usr/share/nginx/html/avatars:ro
      - ./backend/uploads:/usr/share/nginx/html/uploads:ro

volumes:
  postgres_data:


networks:
  fedes-net:
    external: true
